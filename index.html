<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻影围攻 - 我嫩爹</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050208 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }

        #scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .center-text {
            position: absolute;
            font-size: 5rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 
                0 0 10px #ff00ea,
                0 0 20px #ff00ea,
                0 0 40px #ff00ea;
            z-index: 10;
            pointer-events: none;
            user-select: none;
            transform: translateZ(50px);
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .center-text { font-size: 3rem; }
        }

        /* 环绕元素容器 */
        .troll-item {
            position: absolute;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            backface-visibility: visible;
            animation: float 3s ease-in-out infinite;
        }

        .troll-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.5));
        }

        /* 备用 Emoji 样式 */
        .fallback-emoji {
            font-size: 50px;
            filter: drop-shadow(0 0 10px #a855f7);
            display: none; /* 默认隐藏 */
        }

        .ring {
            position: absolute;
            transform-style: preserve-3d;
            animation: rotate-ring 15s linear infinite;
        }

        .ring-reverse {
            animation: rotate-ring-reverse 20s linear infinite;
        }

        @keyframes rotate-ring {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes rotate-ring-reverse {
            from { transform: rotateY(360deg) rotateX(20deg); }
            to { transform: rotateY(0deg) rotateX(20deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.1); }
        }

        .bg-particles {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #a855f7 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-particles"></div>

    <div id="scene">
        <div class="center-text">我嫩爹</div>
        <div id="ring-1" class="ring"></div>
        <div id="ring-2" class="ring ring-reverse"></div>
    </div>

    <script>
        const ring1 = document.getElementById('ring-1');
        const ring2 = document.getElementById('ring-2');
        const scene = document.getElementById('scene');
        
        // 这里的路径由于环境限制可能无法直接加载本地文件
        const imgSrc = 'image_38cb1c.png'; 

        function createItem(angle, radius, ringContainer, isOuter = false) {
            const container = document.createElement('div');
            container.className = 'troll-item';
            
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'troll-image';
            
            // 备用 Emoji
            const emoji = document.createElement('div');
            emoji.className = 'fallback-emoji';
            emoji.innerText = '😈'; // 搞怪表情作为备选

            // 容错处理：图片加载失败时显示 Emoji
            img.onerror = function() {
                img.style.display = 'none';
                emoji.style.display = 'block';
            };

            container.appendChild(img);
            container.appendChild(emoji);
            
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const rotY = (angle * 180 / Math.PI);

            container.style.transform = `translateX(${x}px) translateZ(${z}px) rotateY(${-rotY}deg) ${isOuter ? 'rotateX(10deg)' : ''}`;
            container.style.animationDelay = `${Math.random() * 2}s`;
            
            ringContainer.appendChild(container);
        }

        function createRings() {
            // 内环 12 个元素
            const count1 = 12;
            const radius1 = 200;
            for (let i = 0; i < count1; i++) {
                createItem((i / count1) * Math.PI * 2, radius1, ring1);
            }

            // 外环 18 个元素
            const count2 = 18;
            const radius2 = 350;
            for (let i = 0; i < count2; i++) {
                createItem((i / count2) * Math.PI * 2, radius2, ring2, true);
            }
        }

        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        function handleMove(e) {
            let x, y;
            if (e.touches && e.touches.length > 0) {
                x = e.touches[0].clientX;
                y = e.touches[0].clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }
            
            if (x !== undefined && y !== undefined) {
                targetX = (x / window.innerWidth - 0.5) * 40;
                targetY = (y / window.innerHeight - 0.5) * -40;
            }
        }

        function update() {
            currentX += (targetX - currentX) * 0.1;
            currentY += (targetY - currentY) * 0.1;
            scene.style.transform = `rotateY(${currentX}deg) rotateX(${currentY}deg)`;
            requestAnimationFrame(update);
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', (e) => {
            if (e.cancelable) e.preventDefault();
            handleMove(e);
        }, { passive: false });

        createRings();
        update();
    </script>
</body>
</html>
