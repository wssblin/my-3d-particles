<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幻影围攻 - 赛博至尊版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-pink: #ff00ea;
            --neon-blue: #00f2ff;
            --neon-purple: #a855f7;
        }

        body {
            margin: 0;
            padding: 0;
            background: #05020a;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: none;
        }

        /* 3D 场景容器 */
        #scene {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: transform 0.2s ease-out;
            pointer-events: none;
        }

        /* 霓虹地平线网格 */
        .grid-floor {
            position: absolute;
            width: 400%;
            height: 400%;
            background-image: 
                linear-gradient(to right, rgba(168, 85, 247, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(168, 85, 247, 0.2) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: rotateX(85deg) translateY(-20%);
            top: 20%;
            z-index: -1;
            animation: grid-move 4s linear infinite;
        }

        @keyframes grid-move {
            from { background-position: 0 0; }
            to { background-position: 0 80px; }
        }

        /* 极致故障文字 */
        .glitch-wrapper {
            position: absolute;
            transform: translateZ(200px);
            z-index: 100;
        }

        .glitch-text {
            font-size: 7rem;
            font-weight: 900;
            color: #fff;
            position: relative;
            text-shadow: 0 0 20px var(--neon-pink);
            animation: shake 0.5s infinite alternate;
        }

        .glitch-text::before, .glitch-text::after {
            content: "我嫩爹";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            color: var(--neon-blue);
            z-index: -1;
            animation: glitch-move 0.3s infinite;
        }

        .glitch-text::after {
            color: var(--neon-pink);
            z-index: -2;
            animation: glitch-move 0.3s infinite reverse;
        }

        @keyframes shake {
            0% { transform: skewX(-5deg); }
            100% { transform: skewX(5deg); }
        }

        @keyframes glitch-move {
            0% { transform: translate(-5px, 3px); }
            50% { transform: translate(5px, -3px); }
            100% { transform: translate(-2px, 2px); }
        }

        @media (max-width: 768px) {
            .glitch-text { font-size: 3.5rem; }
        }

        /* 图片元素 */
        .troll-item {
            position: absolute;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .troll-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 15px var(--neon-purple));
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--neon-purple)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 25px var(--neon-pink)); }
        }

        .fallback-emoji {
            font-size: 55px;
            filter: drop-shadow(0 0 20px var(--neon-pink));
            display: none;
        }

        /* 轨道 */
        .ring {
            position: absolute;
            transform-style: preserve-3d;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ring-1 { animation: rotate-y 8s linear infinite; }
        .ring-2 { animation: rotate-y-rev 15s linear infinite; }
        .ring-3 { animation: rotate-y-tilt 25s linear infinite; }

        @keyframes rotate-y {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes rotate-y-rev {
            from { transform: rotateY(360deg) rotateX(20deg); }
            to { transform: rotateY(0deg) rotateX(20deg); }
        }

        @keyframes rotate-y-tilt {
            from { transform: rotateY(0deg) rotateX(-20deg) rotateZ(15deg); }
            to { transform: rotateY(360deg) rotateX(-20deg) rotateZ(15deg); }
        }

        /* 背景装饰 */
        .scanlines {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 200;
        }

        .hyper-speed {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            z-index: -2;
        }

        /* 爆发动画类 */
        .burst {
            transform: scale(2) translateZ(500px) !important;
            opacity: 0.5;
        }
    </style>
</head>
<body onclick="doBurst()">

    <div class="scanlines"></div>
    <div class="hyper-speed"></div>
    <div class="grid-floor"></div>

    <div id="scene">
        <div class="glitch-wrapper">
            <div class="glitch-text">我嫩爹</div>
        </div>
        <div id="ring-1" class="ring ring-1"></div>
        <div id="ring-2" class="ring ring-2"></div>
        <div id="ring-3" class="ring ring-3"></div>
    </div>

    <script>
        const ringElements = [
            document.getElementById('ring-1'),
            document.getElementById('ring-2'),
            document.getElementById('ring-3')
        ];
        
        const imgSrc = 'image_38cb1c.png'; 
        let items = [];

        function createItem(angle, radius, container, tilt = 0) {
            const wrapper = document.createElement('div');
            wrapper.className = 'troll-item';
            
            const img = document.createElement('img');
            img.src = imgSrc;
            img.className = 'troll-image';
            
            const emoji = document.createElement('div');
            emoji.className = 'fallback-emoji';
            emoji.innerText = '🤡';

            img.onerror = () => {
                img.style.display = 'none';
                emoji.style.display = 'block';
            };

            wrapper.appendChild(img);
            wrapper.appendChild(emoji);
            
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const rotY = (angle * 180 / Math.PI);

            const baseTransform = `translateX(${x}px) translateZ(${z}px) rotateY(${-rotY}deg) rotateX(${tilt}deg)`;
            wrapper.style.transform = baseTransform;
            wrapper.dataset.baseTransform = baseTransform;
            
            container.appendChild(wrapper);
            items.push(wrapper);
        }

        function buildScene() {
            // 内轨
            for (let i = 0; i < 8; i++) {
                createItem((i / 8) * Math.PI * 2, 220, ringElements[0], 0);
            }
            // 中轨
            for (let i = 0; i < 14; i++) {
                createItem((i / 14) * Math.PI * 2, 400, ringElements[1], 20);
            }
            // 外轨
            for (let i = 0; i < 20; i++) {
                createItem((i / 20) * Math.PI * 2, 650, ringElements[2], -15);
            }
        }

        // 交互逻辑
        let tX = 0, tY = 0, cX = 0, cY = 0;

        function handleMove(e) {
            const x = e.touches ? e.touches[0].clientX : e.clientX;
            const y = e.touches ? e.touches[0].clientY : e.clientY;
            
            if (x !== undefined && y !== undefined) {
                tX = (x / window.innerWidth - 0.5) * 80;
                tY = (y / window.innerHeight - 0.5) * -80;
            }
        }

        // 爆发冲击波效果
        function doBurst() {
            items.forEach(item => {
                item.classList.add('burst');
                setTimeout(() => {
                    item.classList.remove('burst');
                }, 500);
            });
            
            // 屏幕抖动
            document.body.style.animation = 'screen-shake 0.2s 3';
            setTimeout(() => {
                document.body.style.animation = '';
            }, 600);
        }

        const shakeStyle = document.createElement('style');
        shakeStyle.innerHTML = `
            @keyframes screen-shake {
                0% { transform: translate(0,0); }
                25% { transform: translate(10px, 10px); }
                50% { transform: translate(-10px, -10px); }
                75% { transform: translate(10px, -10px); }
                100% { transform: translate(0,0); }
            }
        `;
        document.head.appendChild(shakeStyle);

        function update() {
            cX += (tX - cX) * 0.1;
            cY += (tY - cY) * 0.1;
            document.getElementById('scene').style.transform = `rotateY(${cX}deg) rotateX(${cY}deg)`;
            requestAnimationFrame(update);
        }

        document.addEventListener('mousemove', handleMove);
        document.addEventListener('touchmove', (e) => {
            if (e.cancelable) e.preventDefault();
            handleMove(e);
        }, { passive: false });

        buildScene();
        update();
    </script>
</body>
</html>
