<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D 交互式浪漫粒子系统 - 沉浸版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Montserrat', sans-serif; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between; padding: 12px; box-sizing: border-box;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s ease;
        }
        /* 隐藏 UI 时的状态 */
        .ui-hidden { opacity: 0; pointer-events: none !important; transform: translateY(10px); }

        .interactive-element { pointer-events: auto; }

        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 1rem; text-align: center;
            z-index: 20; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px;
            pointer-events: none; transition: opacity 0.5s;
        }

        #toast {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(50, 200, 100, 0.9); color: white; padding: 8px 20px;
            border-radius: 25px; font-size: 0.85rem; opacity: 0; pointer-events: none;
            transition: opacity 0.3s; z-index: 30; box-shadow: 0 4px 15px rgba(0,0,0,0.4); font-weight: 500;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            padding: 12px; color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-width: 90vw;
        }
        
        .scroll-area { overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #input_video { display: none; }
        
        /* 适配手机端的浮动显隐按钮 */
        #ui-toggle-hint {
            position: absolute; bottom: 20px; right: 20px; z-index: 5;
            background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.4);
            padding: 5px 10px; border-radius: 20px; font-size: 10px;
            pointer-events: none; border: 1px solid rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
    </style>
</head>
<body>

    <div id="loader">正在构建高精模型...</div>
    <div id="toast"></div>
    <video id="input_video"></video>
    <div id="ui-toggle-hint">点击空白处切换 UI 显隐</div>

    <div id="ui-layer">
        <!-- 顶部控制栏 -->
        <div class="flex justify-between items-start w-full">
            <div class="glass-panel interactive-element w-full sm:w-72">
                <div class="flex justify-between items-center mb-2">
                    <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-purple-400">粒子幻境</h1>
                    <button onclick="toggleCleanMode()" class="text-[10px] bg-white/10 px-2 py-1 rounded">隐藏界面</button>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div class="flex items-center gap-2 bg-white/5 p-2 rounded-lg border border-white/5">
                        <input type="color" id="colorPicker" value="#ffffff" class="w-5 h-5 rounded-full cursor-pointer bg-transparent border-none">
                        <span class="text-[10px] text-gray-400">氛围色</span>
                    </div>
                    <button onclick="takeSnapshot()" class="bg-amber-600/30 border border-amber-500/30 py-1.5 rounded-lg text-[10px]">📸 保存截图</button>
                </div>
                
                <div class="text-[10px] text-gray-400 font-bold mb-1 pb-1 border-b border-white/10 uppercase tracking-wider">选择形态:</div>
                <div class="scroll-area max-h-48 grid grid-cols-3 gap-1.5" id="shape-list"></div>
            </div>

            <div class="interactive-element ml-2">
                <button onclick="toggleFullScreen()" class="glass-panel p-2 hover:bg-white/20 h-10 w-10 flex items-center justify-center rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 4l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                </button>
            </div>
        </div>

        <!-- 底部控制栏 -->
        <div class="flex flex-col sm:flex-row justify-between items-end gap-3">
            <div class="glass-panel interactive-element w-full sm:w-64">
                <label class="flex items-center gap-2 text-[10px] font-bold mb-1.5 text-blue-300">
                    📸 上传照片定制粒子
                </label>
                <input type="file" id="imageUpload" multiple accept="image/*" class="text-[10px] w-full text-gray-400 file:mr-2 file:py-1 file:px-2 file:rounded-full file:border-0 file:text-[10px] file:bg-blue-600 file:text-white"/>
            </div>

            <div class="flex gap-2 w-full sm:w-auto">
                <button id="audioBtn" onclick="toggleAudio()" class="glass-panel interactive-element flex-1 sm:flex-none text-[10px] py-2 px-4 border border-emerald-500/30">🎵 律动</button>
                <div class="glass-panel flex items-center gap-2 px-3 py-2">
                    <div id="hand-indicator" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="hand-status" class="text-[10px] font-bold">手势未就绪</span>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        // --- 1. 全局状态控制 ---
        let isCleanMode = false;
        const uiLayer = document.getElementById('ui-layer');

        // 切换沉浸模式（隐藏 UI）
        function toggleCleanMode(force) {
            isCleanMode = force !== undefined ? force : !isCleanMode;
            if (isCleanMode) {
                uiLayer.classList.add('ui-hidden');
                document.getElementById('ui-toggle-hint').style.opacity = "0.6";
            } else {
                uiLayer.classList.remove('ui-hidden');
                document.getElementById('ui-toggle-hint').style.opacity = "0";
            }
        }

        // 监听全屏切换，进入全屏时自动开启沉浸模式
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                toggleCleanMode(true);
                showToast("已进入全屏沉浸模式，点击屏幕任意位置显示菜单");
            } else {
                toggleCleanMode(false);
            }
        });

        // 点击画布容器切换 UI 显隐
        document.getElementById('canvas-container').addEventListener('click', (e) => {
            // 如果点击的是空白处（不是 UI 元素），则切换
            toggleCleanMode();
        });

        // --- 2. 基础配置 ---
        const CONFIG = {
            particleCount: window.innerWidth < 768 ? 6000 : 12000, // 手机端减少粒子数保证流畅度
            particleSize: window.innerWidth < 768 ? 12.0 : 9.0,   // 手机端粒子稍大点
            defaultColor: new THREE.Color('#ffffff'),
            atlasGrid: 4
        };

        const SHAPES_DATA = [
            { id: 'heart', name: '❤️' }, { id: 'rose', name: '🌹' }, { id: 'star', name: '⭐' },
            { id: 'moon', name: '🌙' }, { id: 'butterfly', name: '🦋' }, { id: 'ring', name: '💍' },
            { id: 'snowflake', name: '❄️' }, { id: 'dna', name: '🧬' }, { id: 'galaxy', name: '🌌' },
            { id: 'tree', name: '🎄' }, { id: 'diamond', name: '💎' }, { id: 'crown', name: '👑' },
            { id: 'music', name: '🎵' }, { id: 'lips', name: '💋' }, { id: 'fireworks', name: '🎆' }
        ];

        let scene, camera, renderer, particles, material, geometry, controls, clock = new THREE.Clock();
        let targetPositions = [], handExpansion = 0, targetHandExpansion = 0;
        let audioContext, analyser, dataArray, isAudioActive = false;
        let textureAtlasCanvas, textureAtlasTexture;

        // --- 3. 初始化 ---
        function init() {
            initThree();
            initUI();
            setupMediaPipe();
        }

        function initUI() {
            const list = document.getElementById('shape-list');
            SHAPES_DATA.forEach(shape => {
                const btn = document.createElement('button');
                btn.className = 'bg-white/5 border border-white/5 p-2 rounded text-sm text-center interactive-element hover:bg-white/20 active:scale-90 transition-all';
                btn.innerText = shape.name;
                btn.onclick = (e) => { e.stopPropagation(); setShape(shape.id); };
                list.appendChild(btn);
            });
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050505, 0.002);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // 材质和纹理图集
            textureAtlasCanvas = document.createElement('canvas');
            textureAtlasCanvas.width = textureAtlasCanvas.height = 1024;
            generateDefaultAtlas();
            textureAtlasTexture = new THREE.CanvasTexture(textureAtlasCanvas);
            
            // 粒子系统
            geometry = new THREE.BufferGeometry();
            const pos = new Float32Array(CONFIG.particleCount * 3);
            const sizes = new Float32Array(CONFIG.particleCount);
            const indices = new Float32Array(CONFIG.particleCount);
            for(let i=0; i<CONFIG.particleCount; i++) {
                pos[i*3] = (Math.random()-0.5)*200;
                pos[i*3+1] = (Math.random()-0.5)*200;
                pos[i*3+2] = (Math.random()-0.5)*200;
                sizes[i] = Math.random() * 0.5 + 0.5;
                indices[i] = Math.floor(Math.random() * 16);
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            geometry.setAttribute('imgIndex', new THREE.BufferAttribute(indices, 1));

            material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uColor: { value: new THREE.Color('#ffffff') },
                    uTexture: { value: textureAtlasTexture },
                    uAtlasGrid: { value: CONFIG.atlasGrid },
                    uExpansion: { value: 0 },
                    uAudioLevel: { value: 0 },
                    uSize: { value: CONFIG.particleSize },
                    uPixelRatio: { value: renderer.getPixelRatio() }
                },
                vertexShader: `
                    uniform float uTime; uniform float uExpansion; uniform float uAudioLevel;
                    uniform float uSize; uniform float uPixelRatio;
                    attribute float size; attribute float imgIndex;
                    varying float vImgIndex; varying float vOpacity;
                    void main() {
                        vImgIndex = imgIndex;
                        vec3 pos = position;
                        vec3 dir = normalize(pos);
                        pos += dir * uExpansion * 15.0;
                        pos += dir * sin(length(pos)*0.2 - uTime*3.0) * uAudioLevel * 10.0;
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_Position = projectionMatrix * mvPosition;
                        gl_PointSize = uSize * size * uPixelRatio * (60.0 / -mvPosition.z);
                        vOpacity = smoothstep(120.0, 20.0, -mvPosition.z);
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor; uniform sampler2D uTexture; uniform float uAtlasGrid;
                    varying float vImgIndex; varying float vOpacity;
                    void main() {
                        float col = mod(vImgIndex, uAtlasGrid);
                        float row = floor(vImgIndex / uAtlasGrid);
                        vec2 uv = (gl_PointCoord + vec2(col, row)) / uAtlasGrid;
                        vec4 tex = texture2D(uTexture, vec2(uv.x, 1.0 - uv.y));
                        if(tex.a < 0.3) discard;
                        gl_FragColor = vec4(tex.rgb * uColor, tex.a * vOpacity);
                    }
                `,
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
            targetPositions = Array.from(pos);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            window.addEventListener('resize', onWindowResize);
            animate();
            setShape('heart');
            setTimeout(() => document.getElementById('loader').style.opacity = 0, 1000);
        }

        // 生成默认图标
        function generateDefaultAtlas() {
            const ctx = textureAtlasCanvas.getContext('2d');
            ctx.clearRect(0,0,1024,1024);
            const s = 1024/4;
            const icons = ["❤️","🌹","⭐","🌙","🦋","💍","❄️","🧬","🌌","🎄","💎","👑","🎵","💋","🎆","🌸"];
            ctx.font = `${s*0.7}px serif`; ctx.textAlign="center"; ctx.textBaseline="middle";
            ctx.fillStyle = "white";
            icons.forEach((icon, i) => {
                ctx.fillText(icon, (i%4)*s + s/2, Math.floor(i/4)*s + s/2);
            });
        }

        // --- 核心逻辑 ---
        function setShape(type) {
            const pos = new Float32Array(CONFIG.particleCount * 3);
            for(let i=0; i<CONFIG.particleCount; i++) {
                const t = Math.random() * Math.PI * 2;
                const v = Math.random();
                let x=0, y=0, z=0;
                if(type === 'heart') {
                    x = 16 * Math.pow(Math.sin(t), 3);
                    y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                    x *= v; y *= v; z = (Math.random()-0.5)*5*v;
                } else if(type === 'star') {
                    const r = (i%2==0 ? 15 : 7) * v;
                    x = r * Math.cos(t); y = r * Math.sin(t); z = (Math.random()-0.5)*5;
                } else {
                    const r = 15 * Math.pow(Math.random(), 0.3);
                    const p = Math.acos(2*Math.random()-1);
                    x = r*Math.sin(p)*Math.cos(t); y = r*Math.sin(p)*Math.sin(t); z = r*Math.cos(p);
                }
                pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z;
            }
            targetPositions = pos;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            material.uniforms.uTime.value = time;
            controls.update();
            
            // 缓动粒子位置
            const currentPos = particles.geometry.attributes.position.array;
            for(let i=0; i<currentPos.length; i++) {
                currentPos[i] += (targetPositions[i] - currentPos[i]) * 0.05;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // 扩展系数平滑
            handExpansion += (targetHandExpansion - handExpansion) * 0.1;
            material.uniforms.uExpansion.value = handExpansion;

            // 音频处理
            if(isAudioActive && analyser) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0; dataArray.forEach(v => sum += v);
                material.uniforms.uAudioLevel.value = sum / (dataArray.length * 255);
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 交互功能 ---
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        }

        function takeSnapshot() {
            renderer.render(scene, camera);
            const link = document.createElement('a');
            link.download = 'particles.png';
            link.href = renderer.domElement.toDataURL();
            link.click();
            showToast("截图已保存");
        }

        async function toggleAudio() {
            if(!isAudioActive) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioContext.createAnalyser();
                    audioContext.createMediaStreamSource(stream).connect(analyser);
                    dataArray = new Uint8Array(analyser.frequencyBinCount);
                    isAudioActive = true;
                    document.getElementById('audioBtn').innerText = "🔊 律动中";
                    showToast("音乐同步已开启");
                } catch(e) { showToast("无法开启麦克风"); }
            } else {
                isAudioActive = false;
                document.getElementById('audioBtn').innerText = "🎵 律动";
            }
        }

        // 手势追踪
        function setupMediaPipe() {
            const hands = new Hands({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
            hands.setOptions({maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5});
            hands.onResults(res => {
                const indicator = document.getElementById('hand-indicator');
                const status = document.getElementById('hand-status');
                if(res.multiHandLandmarks && res.multiHandLandmarks.length > 0) {
                    const lm = res.multiHandLandmarks[0];
                    const d = Math.sqrt(Math.pow(lm[4].x-lm[8].x,2)+Math.pow(lm[4].y-lm[8].y,2));
                    targetHandExpansion = Math.max(0, (d-0.05)*4);
                    indicator.style.backgroundColor = "#4ade80";
                    status.innerText = "手势交互中";
                } else {
                    targetHandExpansion = 0;
                    indicator.style.backgroundColor = "#ef4444";
                    status.innerText = "等待手势";
                }
            });
            const cam = new Camera(document.getElementById('input_video'), {
                onFrame: async () => { await hands.send({image: document.getElementById('input_video')}); },
                width: 480, height: 360
            });
            cam.start().catch(() => console.log("Camera disabled"));
        }

        document.getElementById('colorPicker').oninput = (e) => material.uniforms.uColor.value.set(e.target.value);
        
        // 初始化
        window.onload = init;
    </script>
</body>
</html>
